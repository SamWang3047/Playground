version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: weekly-report-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: weekly_report
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-304714}
    volumes:
      - weekly_report_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d weekly_report"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weekly-report-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-304714}@db:5432/weekly_report?schema=public
    ports:
      - "3000:3000"

volumes:
  weekly_report_db_data:
